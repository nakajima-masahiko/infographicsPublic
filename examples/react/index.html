<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Indicator Lifecycle Example</title>
  <link rel="stylesheet" href="../shared/example.css" />
</head>
<body>
  <main>
    <h1>React: mount/unmount と lifecycle 対応</h1>
    <div id="app"></div>
  </main>

  <script type="module">
    import React, { useEffect, useMemo, useRef, useState } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import {
      createIndicatorRegistry,
      createSma3Indicator,
      createSampleData,
      createIndicatorChart,
    } from '../shared/indicator-core.js';

    function IndicatorPanel({ rows, onLog }) {
      const rootRef = useRef(null);
      const chartRef = useRef(null);
      const registry = useMemo(() => createIndicatorRegistry(), []);
      const indicator = useMemo(() => {
        const reg = registry.registerIndicator(createSma3Indicator());
        onLog('register: sample.sma3');
        return { definition: registry.getIndicator('sample.sma3'), unregister: reg.unregister };
      }, [registry, onLog]);

      useEffect(() => {
        chartRef.current = createIndicatorChart(rootRef.current, indicator.definition, rows, (event, payload) => {
          onLog(`${event}: ${JSON.stringify(payload)}`);
        });
        return () => {
          chartRef.current?.dispose();
          indicator.unregister();
          onLog('unregister: sample.sma3');
        };
      }, []);

      useEffect(() => {
        chartRef.current?.update(rows);
        onLog(`props update -> chart.update(rows=${rows.length})`);
      }, [rows, onLog]);

      return React.createElement('div', { className: 'panel' },
        React.createElement('p', null, '対応: ', React.createElement('code', null, 'mount(useEffect[]) → init / props変更(useEffect[rows]) → update / unmount(cleanup) → dispose')),
        React.createElement('div', { ref: rootRef })
      );
    }

    function App() {
      const [mounted, setMounted] = useState(true);
      const [rows, setRows] = useState(() => createSampleData(14));
      const [logs, setLogs] = useState([]);
      const pushLog = (line) => setLogs((prev) => [`${new Date().toLocaleTimeString()} ${line}`, ...prev].slice(0, 20));

      return React.createElement(React.Fragment, null,
        React.createElement('div', { className: 'panel' },
          React.createElement('div', { className: 'controls' },
            React.createElement('button', { onClick: () => setMounted((v) => !v) }, mounted ? 'unmount' : 'mount'),
            React.createElement('button', { onClick: () => setRows((prev) => [...prev, { x: prev.length + 1, close: Number((prev.at(-1).close + 0.7).toFixed(2)) }]) }, 'props更新(update)')
          )
        ),
        mounted && React.createElement(IndicatorPanel, { rows, onLog: pushLog }),
        React.createElement('div', { className: 'panel' },
          React.createElement('h2', null, 'Lifecycle log'),
          React.createElement('pre', { className: 'log' }, logs.join('\n'))
        )
      );
    }

    createRoot(document.querySelector('#app')).render(React.createElement(App));
  </script>
</body>
</html>
