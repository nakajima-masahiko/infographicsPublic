<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vue Indicator Lifecycle Example</title>
  <link rel="stylesheet" href="../shared/example.css" />
</head>
<body>
  <main>
    <h1>Vue 3 (setup/composable): lifecycle 対応</h1>
    <div id="app"></div>
  </main>

  <script type="module">
    import { createApp, defineComponent, onMounted, onUnmounted, ref, watch } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js';
    import { createIndicatorRegistry, createSma3Indicator, createSampleData, createIndicatorChart } from '../shared/indicator-core.js';

    const IndicatorHost = defineComponent({
      props: { rows: { type: Array, required: true }, pushLog: { type: Function, required: true } },
      setup(props) {
        const rootRef = ref(null);
        const registry = createIndicatorRegistry();
        const registration = registry.registerIndicator(createSma3Indicator());
        const indicator = registry.getIndicator('sample.sma3');
        let chart = null;
        props.pushLog('register: sample.sma3');

        onMounted(() => {
          chart = createIndicatorChart(rootRef.value, indicator, props.rows, (event, payload) => {
            props.pushLog(`${event}: ${JSON.stringify(payload)}`);
          });
        });

        watch(() => props.rows, (nextRows) => {
          chart?.update(nextRows);
          props.pushLog(`watch(props.rows) -> chart.update(rows=${nextRows.length})`);
        });

        onUnmounted(() => {
          chart?.dispose();
          registration.unregister();
          props.pushLog('unregister: sample.sma3');
        });

        return { rootRef };
      },
      template: `<div class="panel"><div ref="rootRef"></div></div>`,
    });

    createApp({
      components: { IndicatorHost },
      setup() {
        const mounted = ref(true);
        const rows = ref(createSampleData(14));
        const logs = ref([]);
        const pushLog = (line) => {
          logs.value = [`${new Date().toLocaleTimeString()} ${line}`, ...logs.value].slice(0, 20);
        };
        const addRow = () => {
          rows.value = [...rows.value, { x: rows.value.length + 1, close: Number((rows.value.at(-1).close + 0.7).toFixed(2)) }];
        };
        return { mounted, rows, logs, pushLog, addRow };
      },
      template: `
        <div>
          <div class="panel">
            <div class="controls">
              <button @click="mounted = !mounted">{{ mounted ? 'unmount' : 'mount' }}</button>
              <button @click="addRow">props相当更新(update)</button>
            </div>
            <p><code>onMounted → init / watch(props.rows) → update / onUnmounted → dispose</code></p>
          </div>

          <IndicatorHost v-if="mounted" :rows="rows" :push-log="pushLog" />

          <div class="panel">
            <h2>Lifecycle log</h2>
            <pre class="log">{{ logs.join('\n') }}</pre>
          </div>
        </div>
      `,
    }).mount('#app');
  </script>
</body>
</html>
