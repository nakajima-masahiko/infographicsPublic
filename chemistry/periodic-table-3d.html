<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D周期表 / 3D Periodic Table</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --bg-main: #020617;
  --bg-card: #0f172a;
  --bg-panel: #1e293b;
  --bg-glass: rgba(15,23,42,0.7);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #475569;
  --border: rgba(148,163,184,0.15);
  --accent: #38bdf8;
  --accent-glow: rgba(56,189,248,0.3);
  --cat-alkali: #ef4444;
  --cat-alkaline: #f97316;
  --cat-transition: #eab308;
  --cat-post-transition: #22c55e;
  --cat-metalloid: #14b8a6;
  --cat-nonmetal: #3b82f6;
  --cat-halogen: #8b5cf6;
  --cat-noble: #ec4899;
  --cat-lanthanide: #6366f1;
  --cat-actinide: #a855f7;
  --cat-unknown: #475569;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg-main);
  color: var(--text-primary);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
/* HEADER */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
#header h1 {
  font-size: 1.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#langBtn {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.2s;
}
#langBtn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
/* MAIN LAYOUT */
#app {
  display: flex;
  height: calc(100vh - 53px);
  overflow: hidden;
}
#tablePane {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  min-width: 0;
}
#detailPane {
  width: 360px;
  min-width: 320px;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  transition: transform 0.3s;
}
#detailPane.hidden { display: none; }
/* PERIODIC TABLE GRID */
#ptGrid {
  display: grid;
  grid-template-columns: repeat(18, minmax(0, 1fr));
  grid-template-rows: repeat(10, auto);
  gap: 3px;
  width: 100%;
  min-width: 700px;
}
/* ELEMENT CARD */
.el-card {
  position: relative;
  cursor: pointer;
  border-radius: 4px;
  padding: 3px 2px 2px;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  border: 1px solid transparent;
  transition: all 0.15s;
  overflow: hidden;
  min-width: 0;
}
.el-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.12;
  transition: opacity 0.15s;
}
.el-card:hover::before { opacity: 0.25; }
.el-card:hover {
  transform: scale(1.1);
  z-index: 10;
  box-shadow: 0 0 12px var(--cat-color, #888);
  border-color: var(--cat-color, #888);
}
.el-card.selected {
  border-color: white;
  box-shadow: 0 0 16px white;
  transform: scale(1.05);
  z-index: 10;
}
.el-num { font-size: 0.45em; color: var(--text-secondary); line-height: 1; align-self: flex-start; padding-left: 2px; }
.el-flag { font-size: 0.5em; position: absolute; top: 2px; right: 2px; line-height: 1; }
.el-sym { font-size: 1.1em; font-weight: 700; line-height: 1; }
.el-name { font-size: 0.38em; color: var(--text-secondary); line-height: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; text-align: center; }
.el-mass { font-size: 0.35em; color: var(--text-muted); line-height: 1; }
/* Category background colors */
.cat-alkali { --cat-color: var(--cat-alkali); background: rgba(239,68,68,0.18); }
.cat-alkali::before { background: var(--cat-alkali); }
.cat-alkaline { --cat-color: var(--cat-alkaline); background: rgba(249,115,22,0.18); }
.cat-alkaline::before { background: var(--cat-alkaline); }
.cat-transition { --cat-color: var(--cat-transition); background: rgba(234,179,8,0.15); }
.cat-transition::before { background: var(--cat-transition); }
.cat-post-transition { --cat-color: var(--cat-post-transition); background: rgba(34,197,94,0.15); }
.cat-post-transition::before { background: var(--cat-post-transition); }
.cat-metalloid { --cat-color: var(--cat-metalloid); background: rgba(20,184,166,0.18); }
.cat-metalloid::before { background: var(--cat-metalloid); }
.cat-nonmetal { --cat-color: var(--cat-nonmetal); background: rgba(59,130,246,0.18); }
.cat-nonmetal::before { background: var(--cat-nonmetal); }
.cat-halogen { --cat-color: var(--cat-halogen); background: rgba(139,92,246,0.18); }
.cat-halogen::before { background: var(--cat-halogen); }
.cat-noble { --cat-color: var(--cat-noble); background: rgba(236,72,153,0.18); }
.cat-noble::before { background: var(--cat-noble); }
.cat-lanthanide { --cat-color: var(--cat-lanthanide); background: rgba(99,102,241,0.18); }
.cat-lanthanide::before { background: var(--cat-lanthanide); }
.cat-actinide { --cat-color: var(--cat-actinide); background: rgba(168,85,247,0.18); }
.cat-actinide::before { background: var(--cat-actinide); }
.cat-unknown { --cat-color: var(--cat-unknown); background: rgba(71,85,105,0.18); }
.cat-unknown::before { background: var(--cat-unknown); }
/* Spacer row */
.pt-spacer {
  grid-column: 1 / -1;
  height: 10px;
  grid-row: 8;
}
/* Lanthanide/Actinide labels */
.pt-la-label, .pt-ac-label {
  grid-column: 1 / 3;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 4px;
  font-size: 0.55em;
  color: var(--text-muted);
}
/* LEGEND */
#legend {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px;
  background: var(--bg-card);
  border-radius: 8px;
  border: 1px solid var(--border);
}
#studyPanel {
  margin-top: 12px;
  padding: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
}
#studyPanel h2 {
  font-size: 0.95rem;
  margin-bottom: 8px;
}
#studyPanel ul {
  margin-left: 1.2em;
  color: var(--text-secondary);
  font-size: 0.78rem;
  line-height: 1.7;
}
#controls {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  padding: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
}
#controls label {
  font-size: 0.75rem;
  color: var(--text-secondary);
}
#controls select,
#controls button {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 0.78rem;
}
#controls button {
  cursor: pointer;
}
.el-card:focus-visible,
#langBtn:focus-visible,
#controls button:focus-visible,
#controls select:focus-visible,
#wikiLink:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.72rem;
  color: var(--text-secondary);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
/* DETAIL PANE */
#detailHeader {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
}
#d3Container {
  width: 100%;
  height: 280px;
  background: transparent;
  position: relative;
  overflow: hidden;
}
#d3Container canvas { display: block; }
#elDetailCard {
  padding: 16px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
}
#elDetailCard .big-sym {
  font-size: 3.5rem;
  font-weight: 800;
  line-height: 1;
}
#elDetailCard .detail-num { font-size: 0.9rem; color: var(--text-secondary); }
#elDetailCard .detail-name { font-size: 1.3rem; font-weight: 600; margin-top: 4px; }
#elDetailCard .detail-mass { color: var(--text-secondary); font-size: 0.9rem; }
#elDetailInfo {
  padding: 16px;
  font-size: 0.82rem;
  line-height: 1.7;
}
#elDetailInfo .info-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
#elDetailInfo .info-label { color: var(--text-muted); flex-shrink: 0; }
#elDetailInfo .info-value { color: var(--text-primary); text-align: right; }
#elDesc {
  margin-top: 12px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.7;
}
#elEtym {
  margin-top: 8px;
  font-size: 0.78rem;
  color: var(--text-muted);
  font-style: italic;
  line-height: 1.6;
}
#wikiLink {
  display: inline-block;
  margin-top: 12px;
  padding: 6px 16px;
  background: var(--accent);
  color: #000;
  text-decoration: none;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  transition: opacity 0.2s;
}
#wikiLink:hover { opacity: 0.8; }
/* TOOLTIP */
#tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  background: rgba(15,23,42,0.95);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  max-width: 260px;
  font-size: 0.78rem;
  line-height: 1.6;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#tooltip .tt-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}
#tooltip .tt-sym { font-size: 1.6rem; font-weight: 800; }
#tooltip .tt-name { font-size: 1rem; font-weight: 600; }
#tooltip .tt-num { font-size: 0.75rem; color: var(--text-muted); }
#tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; }
#tooltip .tt-label { color: var(--text-muted); }
#tooltip .tt-etym { margin-top: 6px; color: var(--text-muted); font-style: italic; font-size: 0.75rem; }
#tooltip .tt-desc { margin-top: 6px; color: var(--text-secondary); font-size: 0.75rem; border-top: 1px solid var(--border); padding-top: 6px; }
/* PLACEHOLDER CELL */
.pt-placeholder {
  grid-column: 3;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.5em;
  color: var(--text-muted);
  border: 1px dashed var(--border);
  aspect-ratio: 1;
  cursor: default;
}
/* MOBILE */
@media (max-width: 900px) {
  #app { flex-direction: column; height: auto; overflow: visible; }
  #tablePane { overflow-x: auto; height: auto; }
  #detailPane {
    width: 100%;
    min-width: 0;
    border-left: none;
    border-top: 1px solid var(--border);
  }
  #detailPane.hidden { display: none; }
  #ptGrid { min-width: 600px; }
}
/* Glow animation for selected */
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 10px var(--cat-color, #888); }
  50% { box-shadow: 0 0 25px var(--cat-color, #888), 0 0 40px var(--cat-color, #888); }
}
.el-card.selected { animation: pulse-glow 2s infinite; }
/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-main); }
::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 3px; }

/* ─── MODE BUTTON ACTIVE ────────────────────────────────────────────── */
#controls button.mode-active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

/* ─── TERRAIN MODE ──────────────────────────────────────────────────── */
#terrainContainer {
  display: none;
  width: 100%;
  height: 500px;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  background: #020617;
  border: 1px solid var(--border);
  margin-bottom: 12px;
}
#terrainContainer canvas { display: block; }
#terrainLegend {
  display: none;
  margin-bottom: 12px;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.78rem;
}
#terrainLegend h3 { font-size: 0.85rem; margin-bottom: 6px; color: var(--accent); }
#terrainLegend p { font-size: 0.72rem; color: var(--text-secondary); margin-bottom: 6px; }
.terrain-scale {
  display: flex;
  align-items: center;
  gap: 8px;
}
.terrain-gradient {
  flex: 1;
  height: 10px;
  border-radius: 5px;
  background: linear-gradient(to right, #ef4444, #eab308, #3b82f6);
}

/* ─── COSMIC MODE ───────────────────────────────────────────────────── */
#cosmicContainer {
  display: none;
  width: 100%;
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
}
#cosmicContainer h2 {
  font-size: 1rem;
  margin-bottom: 16px;
  color: var(--accent);
  text-align: center;
}
.cosmic-group {
  margin-bottom: 16px;
  border-radius: 8px;
  padding: 14px;
  position: relative;
  overflow: hidden;
}
.cosmic-group-title {
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cosmic-group-subtitle {
  font-size: 0.7rem;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.cosmic-elements {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.cosmic-el {
  padding: 4px 7px;
  border-radius: 5px;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.4s ease;
  opacity: 0;
  transform: translateY(10px);
}
.cosmic-el.visible { opacity: 1; transform: translateY(0); }
.cosmic-el:hover { transform: scale(1.15); }
.cosmic-big-bang  { background: rgba(59,130,246,0.25);  border: 1px solid rgba(59,130,246,0.5);  color: #93c5fd; }
.cosmic-stellar   { background: rgba(234,179,8,0.25);   border: 1px solid rgba(234,179,8,0.5);   color: #fde047; }
.cosmic-supernova { background: rgba(239,68,68,0.25);   border: 1px solid rgba(239,68,68,0.5);   color: #fca5a5; }
.cosmic-human     { background: rgba(168,85,247,0.25);  border: 1px solid rgba(168,85,247,0.5);  color: #d8b4fe; }
.cosmic-group-bigbang  { background: rgba(59,130,246,0.07);  border: 1px solid rgba(59,130,246,0.2); }
.cosmic-group-stellar  { background: rgba(234,179,8,0.07);   border: 1px solid rgba(234,179,8,0.2); }
.cosmic-group-supernova{ background: rgba(239,68,68,0.07);   border: 1px solid rgba(239,68,68,0.2); }
.cosmic-group-human    { background: rgba(168,85,247,0.07);  border: 1px solid rgba(168,85,247,0.2); }
.cosmic-dot {
  width: 10px; height: 10px; border-radius: 50%;
  display: inline-block; flex-shrink: 0;
}

/* ─── TECHNOLOGY MODE ───────────────────────────────────────────────── */
#techLegend {
  display: none;
  margin-bottom: 12px;
  padding: 10px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
}
#techLegend h3 { font-size: 0.85rem; margin-bottom: 8px; color: var(--accent); }
.tech-legend-items { display: flex; flex-wrap: wrap; gap: 6px; }
.tech-legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.72rem; padding: 3px 8px;
  border-radius: 20px; border: 1px solid var(--border);
}
.tech-icon { font-size: 0.9rem; }
.tt-tech { margin-top: 6px; border-top: 1px solid var(--border); padding-top: 6px; }
.tt-tech-title { font-size: 0.72rem; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
.tt-tech-items { display: flex; flex-wrap: wrap; gap: 4px; }
.tt-tech-badge {
  font-size: 0.7rem; padding: 1px 7px;
  border-radius: 10px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.07);
}
</style>
</head>
<body>
<div id="header">
  <h1 id="pageTitle">⚛ 3D周期表 — 全118元素</h1>
  <button id="langBtn" onclick="toggleLang()">EN</button>
</div>
<div id="app">
  <div id="tablePane">
    <div id="ptGrid"></div>
    <div id="terrainContainer"></div>
    <div id="terrainLegend">
      <h3>Chemical Terrain / 化学地形</h3>
      <p>Height = Atomic Radius &nbsp;|&nbsp; Color = Electronegativity (Low → High)</p>
      <div class="terrain-scale">
        <span style="font-size:0.7rem;color:#ef4444">Low EN</span>
        <div class="terrain-gradient"></div>
        <span style="font-size:0.7rem;color:#3b82f6">High EN</span>
      </div>
    </div>
    <div id="cosmicContainer"></div>
    <div id="techLegend"></div>
    <div id="legend"></div>
    <div id="controls">
      <label for="catFilter" id="lbl-filter">分類フィルター</label>
      <select id="catFilter">
        <option value="all">すべて</option>
      </select>
      <button id="motionBtn" type="button">回転: ON</button>
      <button id="terrainBtn" type="button">Terrain</button>
      <button id="cosmicBtn" type="button">Cosmic Origin</button>
      <button id="techBtn" type="button">Technology</button>
    </div>
    <div id="studyPanel">
      <h2 id="studyTitle">学習ポイント</h2>
      <ul id="studyList"></ul>
    </div>
  </div>
  <div id="detailPane" class="hidden">
    <div id="d3Container"></div>
    <div id="elDetailCard">
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div>
          <div class="detail-num"><span id="dNum"></span> &nbsp; <span id="dFlag"></span></div>
          <div class="big-sym" id="dSym"></div>
          <div class="detail-name" id="dName"></div>
          <div class="detail-mass" id="dMass"></div>
        </div>
        <div id="dCatBadge" style="padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:600;margin-top:4px;"></div>
      </div>
    </div>
    <div id="elDetailInfo">
      <div class="info-row"><span class="info-label" id="lbl-period">周期</span><span class="info-value" id="dPeriod"></span></div>
      <div class="info-row"><span class="info-label" id="lbl-group">族</span><span class="info-value" id="dGroup"></span></div>
      <div class="info-row"><span class="info-label" id="lbl-shells">電子配置</span><span class="info-value" id="dShells"></span></div>
      <div class="info-row"><span class="info-label" id="lbl-disc">発見年</span><span class="info-value" id="dDisc"></span></div>
      <div class="info-row"><span class="info-label" id="lbl-discby">発見者</span><span class="info-value" id="dDiscBy"></span></div>
      <div id="elDesc"></div>
      <div id="elEtym"></div>
      <a id="wikiLink" href="#" target="_blank" rel="noopener">Wikipedia</a>
    </div>
  </div>
</div>
<div id="tooltip"></div>
<script>
// ─── ELEMENT DATA ──────────────────────────────────────────────────────────
// [Z, symbol, nameJA, nameEN, mass, category, period, group, shells, discYear, discBy, flag, etymJA, etymEN, descJA, descEN]
// category keys: alkali, alkaline, transition, post-transition, metalloid, nonmetal, halogen, noble, lanthanide, actinide, unknown
const ELEMENTS = [
  [1,"H","水素","Hydrogen",1.008,"nonmetal",1,1,[1],1766,"H.キャベンディッシュ","🇬🇧","ギリシャ語「水を生む」","Greek: hydro+genes (water-former)","最も軽く宇宙で最も豊富な元素","The lightest and most abundant element in the universe"],

// ─── BUILD GRID ────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('ptGrid');
  grid.innerHTML = '';
  // Place elements
  ELEMENTS.forEach(e => {
    const [z,sym,nameJA,nameEN,mass,cat] = e;
    const pos = POS_MAP[z];
    if (!pos) return;
    const [row, col] = pos;
    const div = document.createElement('div');
    div.className = `el-card ${CATS[cat].css}`;
    div.setAttribute('tabindex', '0');
    div.setAttribute('role', 'button');
    div.dataset.z = z;
    div.dataset.cat = cat;
    div.style.gridRow = row;
    div.style.gridColumn = col;
    div.innerHTML = `
      <span class="el-num">${z}</span>
      <span class="el-flag">${e[11]}</span>
      <span class="el-sym">${sym}</span>
      <span class="el-name">${lang==='ja'?nameJA:nameEN}</span>
      <span class="el-mass">${formatMass(mass)}</span>
    `;
    div.addEventListener('click', () => selectElement(z));
    div.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter' || ev.key === ' ') {
        ev.preventDefault();
        selectElement(z);
      }
    });
    div.addEventListener('mouseenter', (ev) => showTooltip(ev, z));
    div.addEventListener('mouseleave', hideTooltip);
    div.addEventListener('mousemove', moveTooltip);
    grid.appendChild(div);
  });

  // Spacer
  const spacer = document.createElement('div');
  spacer.className = 'pt-spacer';
  grid.appendChild(spacer);

  // Lanthanide placeholder in row 6, col 3
  const laph = document.createElement('div');
  laph.className = 'pt-placeholder';
  laph.style.gridRow = 6;
  laph.style.gridColumn = 3;
  laph.textContent = '57-71';
  grid.appendChild(laph);

  // Actinide placeholder in row 7, col 3
  const acph = document.createElement('div');
  acph.className = 'pt-placeholder';
  acph.style.gridRow = 7;
  acph.style.gridColumn = 3;
  acph.textContent = '89-103';
  grid.appendChild(acph);

  // Lanthanide label row 9, cols 1-2
  const laLabel = document.createElement('div');
  laLabel.className = 'pt-la-label';
  laLabel.style.gridRow = 9;
  laLabel.style.gridColumn = '1/3';
  laLabel.textContent = t('spacerLA');
  grid.appendChild(laLabel);

  const acLabel = document.createElement('div');
  acLabel.className = 'pt-ac-label';
  acLabel.style.gridRow = 10;
  acLabel.style.gridColumn = '1/3';
  acLabel.textContent = t('spacerAC');
  grid.appendChild(acLabel);

  applyCategoryFilter();
}

function renderLegend() {

  leg.innerHTML = Object.entries(CATS).map(([k,v]) =>

       <div class="legend-dot" style="background:${CAT_COLORS[k]}"></div>
       <span>${lang==='ja'?v.ja:v.en}</span>
     </div>`
  ).join('');
}

function populateFilter() {
  const select = document.getElementById('catFilter');
  const current = selectedCategory;
  select.innerHTML = `<option value="all">${t('all')}</option>` + Object.entries(CATS).map(([k,v]) =>
    `<option value="${k}">${lang==='ja' ? v.ja : v.en}</option>`
  ).join('');
  select.value = current;
}

function applyCategoryFilter() {
  document.querySelectorAll('.el-card').forEach(card => {
    const show = selectedCategory === 'all' || card.dataset.cat === selectedCategory;
    card.style.opacity = show ? '1' : '0.22';
    card.style.filter = show ? 'none' : 'grayscale(0.6)';
  });
}

// ─── THREE.JS 3D BOHR MODEL ────────────────────────────────────────────────
let renderer, scene, camera, animId;
const SHELL_CONFIG = [[2],[2,8],[2,8,8],[2,8,18,8],[2,8,18,18,8],[2,8,18,32,18,8],[2,8,18,32,32,18,8]];

function build3D(z) {
  const container = document.getElementById('d3Container');
  // Cleanup previous
  if (renderer) {
    cancelAnimationFrame(animId);
    renderer.dispose();
    container.innerHTML = '';
    renderer = null;
  }

  const W = container.clientWidth || 340;
  const H = 280;
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 1000);
  camera.position.set(0, 0, 14);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);
  const point = new THREE.PointLight(0xffffff, 1.2, 60);
  point.position.set(5, 5, 10);
  scene.add(point);
  const point2 = new THREE.PointLight(0xff6633, 0.6, 40);
  point2.position.set(-5, -5, 5);
  scene.add(point2);

  // Rotating content group (nucleus + shells + electrons)
  const rotGroup = new THREE.Group();
  scene.add(rotGroup);

  // Nucleus
  const nucleusR = 0.3 + Math.log(z + 1) * 0.18;
  const nucGeo = new THREE.SphereGeometry(nucleusR, 32, 32);
  const nucMat = new THREE.MeshPhongMaterial({
    color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 0.5,
    shininess: 80
  });
  const nucleus = new THREE.Mesh(nucGeo, nucMat);
  rotGroup.add(nucleus);

  // Shells + electrons
  const shells = ELEM[z][8];
  const electrons = [];
  shells.forEach((count, si) => {
    const shellR = 1.5 + si * 1.5;
    // Torus ring
    const torusGeo = new THREE.TorusGeometry(shellR, 0.04, 8, 80);
    const torusMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 });
    // Tilt each ring slightly
    const torus = new THREE.Mesh(torusGeo, torusMat);
    torus.rotation.x = Math.PI/2 + (si * 0.3);
    torus.rotation.y = si * 0.5;
    rotGroup.add(torus);

    // Electrons
    const eCount = Math.min(count, 8); // show max 8 per shell visually
    for (let ei = 0; ei < eCount; ei++) {
      const eGeo = new THREE.SphereGeometry(0.1, 12, 12);
      const eMat = new THREE.MeshPhongMaterial({
        color: 0x00ddff, emissive: 0x0099cc, emissiveIntensity: 0.6, shininess: 100
      });
      const eMesh = new THREE.Mesh(eGeo, eMat);
      rotGroup.add(eMesh);
      electrons.push({ mesh: eMesh, shellR, si, angle: (ei / eCount) * Math.PI * 2 });
    }
  });

  // Mouse drag rotation
  let isDragging = false, prevX = 0, prevY = 0;

  const canvas = renderer.domElement;
  canvas.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
  canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotGroup.rotation.y += (e.clientX - prevX) * 0.01;
    rotGroup.rotation.x += (e.clientY - prevY) * 0.01;
    prevX = e.clientX; prevY = e.clientY;
  });
  canvas.addEventListener('mouseup', () => isDragging = false);
  canvas.addEventListener('mouseleave', () => isDragging = false);
  // Touch
  canvas.addEventListener('touchstart', e => { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; });
  canvas.addEventListener('touchmove', e => {
    if (!isDragging) return;
    rotGroup.rotation.y += (e.touches[0].clientX - prevX) * 0.01;
    rotGroup.rotation.x += (e.touches[0].clientY - prevY) * 0.01;
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', () => isDragging = false);

  // Animate
  let t = 0;
  function animate() {
    animId = requestAnimationFrame(animate);
    t += 0.016;
    // Auto-rotate slowly when not dragging
    if (motionEnabled && !isDragging) rotGroup.rotation.y += 0.005;
    // Orbit electrons
    electrons.forEach(({ mesh, shellR, si, angle }) => {
      const speed = 0.8 / (si + 1);
      const a = angle + t * speed;
      mesh.position.x = shellR * Math.cos(a);
      mesh.position.z = shellR * Math.sin(a) * Math.cos(si * 0.3);
      mesh.position.y = shellR * Math.sin(a) * Math.sin(si * 0.3);
    });
    renderer.render(scene, camera);
  }
  animate();
}

function toggleMotion() {
  motionEnabled = !motionEnabled;
  document.getElementById('motionBtn').textContent = motionEnabled ? t('motionOn') : t('motionOff');
}

function getAtomicRadius(sym) {
  if (ATOMIC_RADIUS[sym]) return ATOMIC_RADIUS[sym];
  const el = ELEMENTS.find(e => e[1] === sym);
  if (!el) return 150;
  const period = el[6] || 4;
  const group = el[7] || 9;
  return Math.max(50, 250 - (group || 9) * 8 + period * 12);
}

function getElectronegativity(sym) {
  return ELECTRONEGATIVITY[sym] !== undefined ? ELECTRONEGATIVITY[sym] : 1.5;
}

function enToColor(en) {
  // 0 = red, ~4 = blue, linear interpolation
  const frac = Math.min(1, Math.max(0, en / 4.0));
  // Red(239,68,68) → Yellow(234,179,8) at 0.5 → Blue(59,130,246) at 1.0
  let r, g, b;
  if (frac < 0.5) {
    const t = frac * 2;
    r = Math.round(239 + (234 - 239) * t);
    g = Math.round(68  + (179 - 68)  * t);
    b = Math.round(68  + (8   - 68)  * t);
  } else {
    const t = (frac - 0.5) * 2;
    r = Math.round(234 + (59  - 234) * t);
    g = Math.round(179 + (130 - 179) * t);
    b = Math.round(8   + (246 - 8)   * t);
  }
  return (r << 16) | (g << 8) | b;
}

function buildTerrainScene() {
  const container = document.getElementById('terrainContainer');
  if (terrainRenderer) destroyTerrainScene();

  const W = container.clientWidth || 800;
  const H = 500;
  terrainScene = new THREE.Scene();
  terrainScene.fog = new THREE.FogExp2(0x020617, 0.012);

  terrainCamera = new THREE.PerspectiveCamera(45, W / H, 0.1, 300);
  terrainCamera.position.set(0, 22, 42);
  terrainCamera.lookAt(0, 2, 0);

  terrainRenderer = new THREE.WebGLRenderer({ antialias: true });
  terrainRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  terrainRenderer.setSize(W, H);
  terrainRenderer.setClearColor(0x020617);
  container.appendChild(terrainRenderer.domElement);

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  terrainScene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
  dirLight.position.set(15, 30, 20);
  terrainScene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0x3b82f6, 0.3);
  fillLight.position.set(-15, 10, -10);
  terrainScene.add(fillLight);

  // Base grid floor
  const gridHelper = new THREE.GridHelper(70, 70, 0x1e293b, 0x1e293b);
  terrainScene.add(gridHelper);

  const cols = 18;
  const rows = 7;
  const spacing = 3.5;
  const offsetX = -(cols - 1) * spacing / 2;
  const offsetZ = -(rows - 1) * spacing / 2;

  ELEMENTS.forEach(e => {
    const [z, sym, , , , , period, group] = e;
    if (!period || !group) return; // lanthanides/actinides skip — no group defined
    const col = group - 1;
    const row = period - 1;

    const rawH = getAtomicRadius(sym);
    const h = Math.max(0.3, rawH / 38);
    const en = getElectronegativity(sym);
    const color = enToColor(en);

    // Column body
    const geo = new THREE.BoxGeometry(spacing * 0.72, h, spacing * 0.72);
    const mat = new THREE.MeshPhongMaterial({
      color, emissive: color, emissiveIntensity: 0.12,
      shininess: 55, transparent: true, opacity: 0.9
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      offsetX + col * spacing,
      h / 2,
      offsetZ + row * spacing
    );
    mesh.userData = { z, sym };
    terrainScene.add(mesh);

    // Top cap (glowing sphere)
    const topGeo = new THREE.SphereGeometry(0.18, 8, 8);
    const topMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
    const topMesh = new THREE.Mesh(topGeo, topMat);
    topMesh.position.set(mesh.position.x, h + 0.22, mesh.position.z);
    terrainScene.add(topMesh);
  });

  // Orbit camera animation
  let orbitAngle = 0;
  function terrainAnimate() {
    terrainAnimId = requestAnimationFrame(terrainAnimate);
    orbitAngle += 0.004;
    terrainCamera.position.x = Math.sin(orbitAngle) * 42;
    terrainCamera.position.z = Math.cos(orbitAngle) * 42;
    terrainCamera.position.y = 22 + Math.sin(orbitAngle * 0.4) * 4;
    terrainCamera.lookAt(0, 2, 0);
    terrainRenderer.render(terrainScene, terrainCamera);
  }
  terrainAnimate();
}

function destroyTerrainScene() {
  if (terrainAnimId) { cancelAnimationFrame(terrainAnimId); terrainAnimId = null; }
  if (terrainRenderer) {
    terrainRenderer.dispose();
    const c = document.getElementById('terrainContainer');
    c.innerHTML = '';
    terrainRenderer = null; terrainScene = null; terrainCamera = null;
  }
}

  });
}

// ═══════════════════════════════════════════════════════════════════════════
// TECHNOLOGY MODE
// ═══════════════════════════════════════════════════════════════════════════
const TECH_GROUPS = {
  BATTERY: {
    elements: [3,6,8,25,27,28,30,82], // Li,C,O,Mn,Co,Ni,Zn,Pb
    color: '#22c55e', icon: '🔋',
    nameJA: 'バッテリー', nameEN: 'Battery'
  },
  SEMICONDUCTOR: {
    elements: [5,14,31,32,33,48,49,52,53], // B,Si,Ga,Ge,As,Cd,In,Te,I
    color: '#38bdf8', icon: '💻',
    nameJA: '半導体', nameEN: 'Semiconductor'
  },
  MAGNET: {
    elements: [26,27,28,60,62,66,57,65], // Fe,Co,Ni,Nd,Sm,Dy,La,Tb
    color: '#f97316', icon: '🧲',
    nameJA: '磁石', nameEN: 'Magnet'
  },
  CATALYST: {
    elements: [78,45,77,46,44,58,76,47], // Pt,Rh,Ir,Pd,Ru,Ce,Os,Ag
    color: '#eab308', icon: '⚗️',
    nameJA: '触媒', nameEN: 'Catalyst'
  },
  NUCLEAR: {
    elements: [92,94,90,72,48,64,5,47], // U,Pu,Th,Hf,Cd,Gd,B,Ag
    color: '#a855f7', icon: '☢️',
    nameJA: '核燃料/遮蔽', nameEN: 'Nuclear'
  },
  BIOLOGY: {
    elements: [26,20,12,15,53,30,29,34,7,8,16,11,19], // Fe,Ca,Mg,P,I,Zn,Cu,Se,N,O,S,Na,K
    color: '#ec4899', icon: '🧬',
    nameJA: '生体医療', nameEN: 'Biology'
  }
};

// Reverse lookup: Z → list of tech group keys
const TECH_BY_Z = {};
Object.entries(TECH_GROUPS).forEach(([key, tg]) => {
  tg.elements.forEach(z => {
    if (!TECH_BY_Z[z]) TECH_BY_Z[z] = [];
    TECH_BY_Z[z].push(key);
  });
});

let techMode = false;

function toggleTech() {
  techMode = !techMode;
  const btn = document.getElementById('techBtn');
  const techLeg = document.getElementById('techLegend');
  if (techMode) {
    if (terrainMode) toggleTerrain();
    if (cosmicMode) toggleCosmic();
    btn.classList.add('mode-active');
    techLeg.style.display = 'block';
    buildTechLegend();
    applyTechHighlight();
  } else {
    btn.classList.remove('mode-active');
    techLeg.style.display = 'none';
    removeTechHighlight();
  }
}

function applyTechHighlight() {
  document.querySelectorAll('.el-card').forEach(card => {
    const z = parseInt(card.dataset.z);
    const groups = TECH_BY_Z[z];
    if (groups && groups.length > 0) {
      const tg = TECH_GROUPS[groups[0]];
      card.style.opacity = '1';
      card.style.filter = 'none';
      card.style.boxShadow = `0 0 10px ${tg.color}99, 0 0 22px ${tg.color}44`;
      card.style.borderColor = tg.color;
    } else {
      card.style.opacity = '0.15';
      card.style.filter = 'grayscale(0.9)';
      card.style.boxShadow = 'none';
      card.style.borderColor = '';
    }
  });
}

function removeTechHighlight() {
  document.querySelectorAll('.el-card').forEach(card => {
    card.style.opacity = '';
    card.style.filter = '';
    card.style.boxShadow = '';
    card.style.borderColor = '';
  });
  applyCategoryFilter();
}

function buildTechLegend() {
  const leg = document.getElementById('techLegend');
  const isJA = lang === 'ja';
  let html = `<h3>${isJA ? 'テクノロジーマップ' : 'Technology Map'}</h3><div class="tech-legend-items">`;
  Object.entries(TECH_GROUPS).forEach(([, tg]) => {
    html += `<div class="tech-legend-item" style="border-color:${tg.color}55;color:${tg.color}">
      <span class="tech-icon">${tg.icon}</span>
      <span>${isJA ? tg.nameJA : tg.nameEN}</span>
    </div>`;
  });
  html += '</div>';
  leg.innerHTML = html;
}

function appendTechInfo(z) {
  const groups = TECH_BY_Z[z];
  if (!groups || !groups.length) return;
  const isJA = lang === 'ja';
  const title = isJA ? 'テクノロジー用途' : 'Technology Uses';
  const badgesHTML = groups.map(key => {
    const tg = TECH_GROUPS[key];
    return `<span class="tt-tech-badge" style="border-color:${tg.color}55;color:${tg.color}">${tg.icon} ${isJA ? tg.nameJA : tg.nameEN}</span>`;
  }).join('');
  const div = document.createElement('div');
  div.className = 'tt-tech';
  div.innerHTML = `<div class="tt-tech-title">${title}</div><div class="tt-tech-items">${badgesHTML}</div>`;
  tooltip.appendChild(div);
}

// ─── INIT NEW FEATURES ──────────────────────────────────────────────────────
document.getElementById('terrainBtn').addEventListener('click', toggleTerrain);
document.getElementById('cosmicBtn').addEventListener('click', toggleCosmic);
document.getElementById('techBtn').addEventListener('click', toggleTech);

// Click H by default
selectElement(1);
</script>
