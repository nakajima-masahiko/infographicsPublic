<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D周期表 / 3D Periodic Table</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --bg-main: #020617;
  --bg-card: #0f172a;
  --bg-panel: #1e293b;
  --bg-glass: rgba(15,23,42,0.7);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #475569;
  --border: rgba(148,163,184,0.15);
  --accent: #38bdf8;
  --accent-glow: rgba(56,189,248,0.3);
  --cat-alkali: #ef4444;
  --cat-alkaline: #f97316;
  --cat-transition: #eab308;
  --cat-post-transition: #22c55e;
  --cat-metalloid: #14b8a6;
  --cat-nonmetal: #3b82f6;
  --cat-halogen: #8b5cf6;
  --cat-noble: #ec4899;
  --cat-lanthanide: #6366f1;
  --cat-actinide: #a855f7;
  --cat-unknown: #475569;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg-main);
  color: var(--text-primary);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
/* HEADER */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
#header h1 {
  font-size: 1.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#langBtn {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.2s;
}
#langBtn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
/* MAIN LAYOUT */
#app {
  display: flex;
  height: calc(100vh - 53px);
  overflow: hidden;
}
#tablePane {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  min-width: 0;
}
#detailPane {
  width: 360px;
  min-width: 320px;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  transition: transform 0.3s;
}
#detailPane.hidden { display: none; }
/* PERIODIC TABLE GRID */
#ptGrid {
  display: grid;
  grid-template-columns: repeat(18, minmax(0, 1fr));
  grid-template-rows: repeat(10, auto);
  gap: 3px;
  width: 100%;
  min-width: 700px;
}
/* ELEMENT CARD */
.el-card {
  position: relative;
  cursor: pointer;
  border-radius: 4px;
  padding: 3px 2px 2px;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  border: 1px solid transparent;
  transition: all 0.15s;
  overflow: hidden;
  min-width: 0;
}
.el-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.12;
  transition: opacity 0.15s;
}
.el-card:hover::before { opacity: 0.25; }
.el-card:hover {
  transform: scale(1.1);
  z-index: 10;
  box-shadow: 0 0 12px var(--cat-color, #888);
  border-color: var(--cat-color, #888);
}
.el-card.selected {
  border-color: white;
  box-shadow: 0 0 16px white;
  transform: scale(1.05);
  z-index: 10;
}
.el-num { font-size: 0.45em; color: var(--text-secondary); line-height: 1; align-self: flex-start; padding-left: 2px; }
.el-flag { font-size: 0.5em; position: absolute; top: 2px; right: 2px; line-height: 1; }
.el-sym { font-size: 1.1em; font-weight: 700; line-height: 1; }
.el-name { font-size: 0.38em; color: var(--text-secondary); line-height: 1; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; text-align: center; }
.el-mass { font-size: 0.35em; color: var(--text-muted); line-height: 1; }
/* Category background colors */
.cat-alkali { --cat-color: var(--cat-alkali); background: rgba(239,68,68,0.18); }
.cat-alkali::before { background: var(--cat-alkali); }
.cat-alkaline { --cat-color: var(--cat-alkaline); background: rgba(249,115,22,0.18); }
.cat-alkaline::before { background: var(--cat-alkaline); }
.cat-transition { --cat-color: var(--cat-transition); background: rgba(234,179,8,0.15); }
.cat-transition::before { background: var(--cat-transition); }
.cat-post-transition { --cat-color: var(--cat-post-transition); background: rgba(34,197,94,0.15); }
.cat-post-transition::before { background: var(--cat-post-transition); }
.cat-metalloid { --cat-color: var(--cat-metalloid); background: rgba(20,184,166,0.18); }
.cat-metalloid::before { background: var(--cat-metalloid); }
.cat-nonmetal { --cat-color: var(--cat-nonmetal); background: rgba(59,130,246,0.18); }
.cat-nonmetal::before { background: var(--cat-nonmetal); }
.cat-halogen { --cat-color: var(--cat-halogen); background: rgba(139,92,246,0.18); }
.cat-halogen::before { background: var(--cat-halogen); }
.cat-noble { --cat-color: var(--cat-noble); background: rgba(236,72,153,0.18); }
.cat-noble::before { background: var(--cat-noble); }
.cat-lanthanide { --cat-color: var(--cat-lanthanide); background: rgba(99,102,241,0.18); }
.cat-lanthanide::before { background: var(--cat-lanthanide); }
.cat-actinide { --cat-color: var(--cat-actinide); background: rgba(168,85,247,0.18); }
.cat-actinide::before { background: var(--cat-actinide); }
.cat-unknown { --cat-color: var(--cat-unknown); background: rgba(71,85,105,0.18); }
.cat-unknown::before { background: var(--cat-unknown); }
/* Spacer row */
.pt-spacer {
  grid-column: 1 / -1;
  height: 10px;
  grid-row: 8;
}
/* Lanthanide/Actinide labels */
.pt-la-label, .pt-ac-label {
  grid-column: 1 / 3;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 4px;
  font-size: 0.55em;
  color: var(--text-muted);
}
/* LEGEND */
#legend {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px;
  background: var(--bg-card);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.72rem;
  color: var(--text-secondary);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
/* DETAIL PANE */
#detailHeader {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
}
#d3Container {
  width: 100%;
  height: 280px;
  background: transparent;
  position: relative;
  overflow: hidden;
}
#d3Container canvas { display: block; }
#elDetailCard {
  padding: 16px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
}
#elDetailCard .big-sym {
  font-size: 3.5rem;
  font-weight: 800;
  line-height: 1;
}
#elDetailCard .detail-num { font-size: 0.9rem; color: var(--text-secondary); }
#elDetailCard .detail-name { font-size: 1.3rem; font-weight: 600; margin-top: 4px; }
#elDetailCard .detail-mass { color: var(--text-secondary); font-size: 0.9rem; }
#elDetailInfo {
  padding: 16px;
  font-size: 0.82rem;
  line-height: 1.7;
}
#elDetailInfo .info-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
#elDetailInfo .info-label { color: var(--text-muted); flex-shrink: 0; }
#elDetailInfo .info-value { color: var(--text-primary); text-align: right; }
#elDesc {
  margin-top: 12px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.7;
}
#elEtym {
  margin-top: 8px;
  font-size: 0.78rem;
  color: var(--text-muted);
  font-style: italic;
  line-height: 1.6;
}
#wikiLink {
  display: inline-block;
  margin-top: 12px;
  padding: 6px 16px;
  background: var(--accent);
  color: #000;
  text-decoration: none;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  transition: opacity 0.2s;
}
#wikiLink:hover { opacity: 0.8; }
/* TOOLTIP */
#tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  background: rgba(15,23,42,0.95);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  max-width: 260px;
  font-size: 0.78rem;
  line-height: 1.6;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#tooltip .tt-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}
#tooltip .tt-sym { font-size: 1.6rem; font-weight: 800; }
#tooltip .tt-name { font-size: 1rem; font-weight: 600; }
#tooltip .tt-num { font-size: 0.75rem; color: var(--text-muted); }
#tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; }
#tooltip .tt-label { color: var(--text-muted); }
#tooltip .tt-etym { margin-top: 6px; color: var(--text-muted); font-style: italic; font-size: 0.75rem; }
#tooltip .tt-desc { margin-top: 6px; color: var(--text-secondary); font-size: 0.75rem; border-top: 1px solid var(--border); padding-top: 6px; }
/* PLACEHOLDER CELL */
.pt-placeholder {
  grid-column: 3;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.5em;
  color: var(--text-muted);
  border: 1px dashed var(--border);
  aspect-ratio: 1;
  cursor: default;
}
/* MOBILE */
@media (max-width: 900px) {
  #app { flex-direction: column; height: auto; overflow: visible; }
  #tablePane { overflow-x: auto; height: auto; }
  #detailPane {
    width: 100%;
    min-width: 0;
    border-left: none;
    border-top: 1px solid var(--border);
  }
  #detailPane.hidden { display: none; }
  #ptGrid { min-width: 600px; }
}
/* Glow animation for selected */
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 10px var(--cat-color, #888); }
  50% { box-shadow: 0 0 25px var(--cat-color, #888), 0 0 40px var(--cat-color, #888); }
}
.el-card.selected { animation: pulse-glow 2s infinite; }
/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-main); }
::-webkit-scrollbar-thumb { background: var(--bg-panel); border-radius: 3px; }
</style>
</head>

// ─── TOOLTIP ───────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(ev, z) {
  const e = ELEM[z];
  const cat = CATS[e[5]];
  tooltip.innerHTML = `
    <div class="tt-header">
      <span class="tt-sym" style="color:${CAT_COLORS[e[5]]}">${e[1]}</span>
      <div>
        <div class="tt-name">${lang==='ja'?e[2]:e[3]}</div>

      </div>

    <div class="tt-row"><span class="tt-label">${lang==='ja'?'原子量':'Mass'}</span><span>${e[4]}</span></div>
    <div class="tt-row"><span class="tt-label">${lang==='ja'?'分類':'Category'}</span><span>${lang==='ja'?cat.ja:cat.en}</span></div>
    <div class="tt-row"><span class="tt-label">${lang==='ja'?'電子配置':'Shells'}</span><span>${e[8].join('-')}</span></div>
    ${e[9]?`<div class="tt-row"><span class="tt-label">${lang==='ja'?'発見':'Disc.'}</span><span>${e[9]}</span></div>`:''}
    <div class="tt-etym">${lang==='ja'?e[12]:e[13]}</div>
    <div class="tt-desc">${lang==='ja'?e[14]:e[15]}</div>
  `;
  tooltip.style.display = 'block';
  tooltipVisible = true;
  posTooltip(ev);
}

function posTooltip(ev) {
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  let x = ev.clientX + 14, y = ev.clientY + 14;
  if (x + tw > window.innerWidth - 8) x = ev.clientX - tw - 14;
  if (y + th > window.innerHeight - 8) y = ev.clientY - th - 14;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
function moveTooltip(ev) { if (tooltipVisible) posTooltip(ev); }
function hideTooltip() { tooltip.style.display = 'none'; tooltipVisible = false; }

// ─── THREE.JS 3D BOHR MODEL ────────────────────────────────────────────────
let renderer, scene, camera, animId;
const SHELL_CONFIG = [[2],[2,8],[2,8,8],[2,8,18,8],[2,8,18,18,8],[2,8,18,32,18,8],[2,8,18,32,32,18,8]];

function build3D(z) {
  const container = document.getElementById('d3Container');
  // Cleanup previous
  if (renderer) {
    cancelAnimationFrame(animId);
    renderer.dispose();
    container.innerHTML = '';
    renderer = null;
  }

  const W = container.clientWidth || 340;
  const H = 280;
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 1000);
  camera.position.set(0, 0, 14);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);
  const point = new THREE.PointLight(0xffffff, 1.2, 60);
  point.position.set(5, 5, 10);
  scene.add(point);
  const point2 = new THREE.PointLight(0xff6633, 0.6, 40);
  point2.position.set(-5, -5, 5);
  scene.add(point2);

  // Nucleus
  const nucleusR = 0.3 + Math.log(z + 1) * 0.18;
  const nucGeo = new THREE.SphereGeometry(nucleusR, 32, 32);
  const nucMat = new THREE.MeshPhongMaterial({
    color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 0.5,
    shininess: 80
  });
  const nucleus = new THREE.Mesh(nucGeo, nucMat);
  scene.add(nucleus);

  // Shells + electrons
  const shells = ELEM[z][8];
  const electrons = [];
  const maxShells = shells.length;
  shells.forEach((count, si) => {
    const shellR = 1.5 + si * 1.5;
    // Torus ring
    const torusGeo = new THREE.TorusGeometry(shellR, 0.04, 8, 80);
    const torusMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 });
    // Tilt each ring slightly
    const torus = new THREE.Mesh(torusGeo, torusMat);
    torus.rotation.x = Math.PI/2 + (si * 0.3);
    torus.rotation.y = si * 0.5;
    scene.add(torus);

    // Electrons
    const eCount = Math.min(count, 8); // show max 8 per shell visually
    for (let ei = 0; ei < eCount; ei++) {
      const eGeo = new THREE.SphereGeometry(0.1, 12, 12);
      const eMat = new THREE.MeshPhongMaterial({
        color: 0x00ddff, emissive: 0x0099cc, emissiveIntensity: 0.6, shininess: 100
      });
      const eMesh = new THREE.Mesh(eGeo, eMat);
      scene.add(eMesh);
      electrons.push({ mesh: eMesh, shellR, si, angle: (ei / eCount) * Math.PI * 2, tiltX: Math.PI/2 + (si*0.3), tiltY: si*0.5 });
    }
  });

  // Mouse drag rotation
  let isDragging = false, prevX = 0, prevY = 0;
  const rotGroup = new THREE.Group();
  scene.add(rotGroup);
  // Move nucleus + shells + electrons into rotGroup
  scene.children.filter(c => c !== ambient && c !== point && c !== point2).forEach(c => {
    scene.remove(c);
    rotGroup.add(c);
  });

  const canvas = renderer.domElement;
  canvas.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
  canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotGroup.rotation.y += (e.clientX - prevX) * 0.01;
    rotGroup.rotation.x += (e.clientY - prevY) * 0.01;
    prevX = e.clientX; prevY = e.clientY;
  });
  canvas.addEventListener('mouseup', () => isDragging = false);
  canvas.addEventListener('mouseleave', () => isDragging = false);
  // Touch
  canvas.addEventListener('touchstart', e => { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; });
  canvas.addEventListener('touchmove', e => {
    if (!isDragging) return;
    rotGroup.rotation.y += (e.touches[0].clientX - prevX) * 0.01;
    rotGroup.rotation.x += (e.touches[0].clientY - prevY) * 0.01;
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', () => isDragging = false);

  // Animate
  let t = 0;
  function animate() {
    animId = requestAnimationFrame(animate);
    t += 0.016;
    // Auto-rotate slowly when not dragging
    if (!isDragging) rotGroup.rotation.y += 0.005;
    // Orbit electrons
    electrons.forEach(({ mesh, shellR, si, angle }) => {
      const speed = 0.8 / (si + 1);
      const a = angle + t * speed;
      mesh.position.x = shellR * Math.cos(a);
      mesh.position.z = shellR * Math.sin(a) * Math.cos(si * 0.3);
      mesh.position.y = shellR * Math.sin(a) * Math.sin(si * 0.3);
    });
    renderer.render(scene, camera);
  }
  animate();
}
