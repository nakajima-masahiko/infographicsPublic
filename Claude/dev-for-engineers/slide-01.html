<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slide 01 — 開発にClaudeを取り入れる</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
    :root {
      --coral: #da7756; --coral-light: #f0a080; --coral-dark: #b85a35;
      --navy: #0a0f1e; --card-bg: #141d2b; --card-border: #243044;
      --text-primary: #f0f4ff; --text-secondary: #8ea8c8; --text-muted: #506070;
      --accent-blue: #4a9eff; --accent-purple: #a855f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans JP", sans-serif;
      background: var(--navy);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 15% 50%, rgba(218,119,86,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 75% 25%, rgba(74,158,255,0.3) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }
    /* Nav bar */
    .nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--card-border);
      background: rgba(10,15,30,0.8);
      backdrop-filter: blur(8px);
    }
    .nav-index a {
      color: var(--coral); text-decoration: none; font-size: 13px; font-weight: 700;
      letter-spacing: 0.06em;
    }
    .nav-index a:hover { text-decoration: underline; }
    .nav-progress {
      font-size: 12px; color: var(--text-muted); letter-spacing: 0.08em;
    }
    .nav-arrows { display: flex; gap: 8px; }
    .nav-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 8px;
      border: 1px solid var(--card-border);
      background: var(--card-bg); color: var(--text-secondary);
      text-decoration: none; font-size: 16px;
      transition: border-color 0.2s, color 0.2s;
    }
    .nav-btn:hover { border-color: var(--coral); color: var(--coral); }
    .nav-btn.disabled { opacity: 0.3; pointer-events: none; }

    /* Slide */
    .slide {
      position: relative; z-index: 1;
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 32px;
    }
    .slide-inner {
      max-width: 800px; width: 100%;
      text-align: center;
    }
    .slide-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--coral), var(--coral-dark));
      color: #fff; font-size: 12px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 5px 16px; border-radius: 100px;
      margin-bottom: 28px;
    }
    .slide-title {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff 0%, var(--coral-light) 55%, var(--coral) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .slide-subtitle {
      font-size: clamp(15px, 2.5vw, 20px);
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 48px;
    }
    .slide-subtitle strong { color: var(--coral-light); }

    /* Stats row */
    .stats-row {
      display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .stat { text-align: center; }
    .stat-num {
      font-size: clamp(36px, 5vw, 52px);
      font-weight: 900; color: var(--coral); line-height: 1;
    }
    .stat-label {
      font-size: 12px; color: var(--text-secondary);
      margin-top: 6px; line-height: 1.4;
    }

    /* Tag row */
    .tag-row {
      display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
    }
    .tag {
      font-size: 12px; font-weight: 700; padding: 5px 14px;
      border-radius: 100px; letter-spacing: 0.05em;
    }
    .tag-code { background: rgba(74,158,255,0.15); color: #7dd3fc; }
    .tag-purple { background: rgba(168,85,247,0.15); color: #c084fc; }
    .tag-coral { background: rgba(218,119,86,0.15); color: #f0a080; }
    .tag-green { background: rgba(34,197,94,0.15); color: #86efac; }

    /* Keyboard hint */
    .key-hint {
      margin-top: 48px;
      font-size: 12px; color: var(--text-muted);
    }
    .key-hint kbd {
      display: inline-block;
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 4px; padding: 2px 8px; font-size: 11px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-index"><a href="index.html">← 目次</a></div>
    <div class="nav-progress">SLIDE 01 / 10</div>
    <div class="nav-arrows">
      <a class="nav-btn disabled" aria-disabled="true">←</a>
      <a href="slide-02.html" class="nav-btn">→</a>
    </div>
  </nav>

  <main class="slide">
    <div class="slide-inner">
      <div class="slide-badge">社内エンジニア向け</div>
      <h1 class="slide-title">開発に Claude を<br>取り入れる</h1>
      <p class="slide-subtitle">
        Claudeは「チャットで質問するAI」ではない。<br>
        <strong>コードを一緒に書き、レビューし、ドキュメントを作る<br>開発パートナー</strong>だ。
      </p>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-num">10×</div>
          <div class="stat-label">繰り返し作業の<br>速度向上</div>
        </div>
        <div class="stat">
          <div class="stat-num">5</div>
          <div class="stat-label">主要ユース<br>ケース</div>
        </div>
        <div class="stat">
          <div class="stat-num">0</div>
          <div class="stat-label">初期コスト<br>（試すだけなら）</div>
        </div>
      </div>

      <div class="tag-row">
        <span class="tag tag-code">コード生成</span>
        <span class="tag tag-purple">デバッグ支援</span>
        <span class="tag tag-coral">コードレビュー</span>
        <span class="tag tag-green">ドキュメント</span>
        <span class="tag tag-code">テスト自動化</span>
      </div>

      <div class="key-hint">
        <kbd>→</kbd> 次のスライドへ &nbsp;|&nbsp; <kbd>←</kbd> 前のスライドへ
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') location.href = 'slide-02.html';
    });
  </script>
</body>
</html>
